[theme]
primaryColor = "#0E8C8C"
backgroundColor = "#EDF2F7"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0D1B2A"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
headless = true
port = 8501
runOnSave = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 200
allowRunOnSave = true
