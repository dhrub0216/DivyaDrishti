name: Keep App Alive

on:
  schedule:
    - cron: '0 6 * * *'    # once daily at 6 AM UTC — enough to beat the 7-day timer
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Open app in real browser (resets Streamlit sleep timer)
        run: |
          python3 << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          APP_URL = "https://dhrub0216-divyadrishti-app-3bdjsg.streamlit.app"

          async def wake():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  print(f"Loading {APP_URL} ...")

                  await page.goto(APP_URL, wait_until="domcontentloaded", timeout=60_000)

                  # If Streamlit is showing the sleep screen, click Wake Up
                  try:
                      wake_btn = page.get_by_role("button", name="Yes, get this app back up!")
                      await wake_btn.wait_for(timeout=8_000)
                      print("App was sleeping — clicking wake up...")
                      await wake_btn.click()
                      await page.wait_for_timeout(60_000)
                  except Exception:
                      print("No sleep screen detected — app already awake.")

                  # Wait for Streamlit WebSocket to establish (this is what resets the timer)
                  try:
                      await page.wait_for_selector(
                          "[data-testid='stAppViewContainer']", timeout=90_000
                      )
                      print("App fully loaded. Sleep timer reset.")
                  except Exception:
                      print("App opened but content selector timed out — still counts as a visit.")

                  # Stay connected briefly so the session registers
                  await page.wait_for_timeout(8_000)
                  await browser.close()

          asyncio.run(wake())
          PYEOF
